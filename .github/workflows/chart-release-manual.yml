name: Push Charts to helm-charts-registry manually with specified version

on:
  workflow_dispatch:
    inputs:
      chart_version_generation:
        type: string
        description: "Chart Version Source: chart_yaml (default), specified, ticket_from_branch_short_hash, short_hash, ticket_from_branch_timestamp, timestamp"
        required: true
      chart_version:
        type: string
        description: "Chart version"
        required: true
      image_tag:
        type: string
        description: "image tag"
        required: true
      tag_generation:
        type: string
        description: "image_tag source: ticket_from_branch(default), commit_hash or version_git_tag, specified, chart_yaml (to use appVersion field in Chart.yaml)" 
        required: true
        
concurrency:
  group: schulportal-client-chart-manual
  cancel-in-progress: true

jobs:
  scan:
    uses: dBildungsplattform/dbp-github-workflows/.github/workflows/check-helm-kics.yaml@OPS-6635-image-version-chart-release-option
    permissions:
      contents: read
  release:
    needs: scan
    uses: dBildungsplattform/dbp-github-workflows/.github/workflows/chart-release.yaml@OPS-6635-image-version-chart-release-option
    secrets: inherit
    with:
      chart_name: schulportal-client
      helm_chart_version_generation: ${{ inputs.chart_version_generation }} 
      image_tag_generation: ${{ inputs.tag_generation }}
      helm_chart_version: ${{ inputs.chart_version }}
      image_tag: ${{ inputs.image_tag }}
